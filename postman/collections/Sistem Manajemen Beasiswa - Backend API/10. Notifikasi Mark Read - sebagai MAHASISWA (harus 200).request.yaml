$kind: http-request
url: "{{base_url}}/api/notifikasi/{{notif_id}}/read"
method: PATCH
headers:
  Authorization: Bearer {{token_mahasiswa}}
scripts:
  - type: beforeRequest
    code: |-
      if (!pm.environment.get('notif_id')) {
        console.warn('notif_id kosong -> request di-skip (jalankan request 9 dulu, atau belum ada notifikasi)');
        pm.execution.skipRequest();
      }
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 10000
