$kind: http-request
url: "{{base_url}}/api/penyaluran/{{penyaluran_id}}/verifikasi"
method: PATCH
headers:
  Authorization: Bearer {{token_wabag}}
scripts:
  - type: beforeRequest
    code: |-
      if (!pm.environment.get('penyaluran_id')) {
        console.warn('penyaluran_id kosong -> request di-skip (jalankan request 20 dulu)');
        pm.execution.skipRequest();
      }
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 22000
