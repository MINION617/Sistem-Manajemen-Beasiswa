$kind: http-request
url: "{{base_url}}/health"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Body has status ok', () => pm.expect(pm.response.json().status).to.eql('ok'));
    language: text/javascript
order: 1000
