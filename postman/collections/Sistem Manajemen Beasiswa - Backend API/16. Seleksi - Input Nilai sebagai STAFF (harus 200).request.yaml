$kind: http-request
url: "{{base_url}}/api/seleksi/{{pendaftaran_id}}"
method: PATCH
headers:
  Authorization: Bearer {{token_staff}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "nilaiTes": 88,
      "nilaiWawancara": 85,
      "nilaiKerjaKeras": 8,
      "nilaiKepemimpinan": 8,
      "nilaiKomunikasi": 8,
      "nilaiKeberanian": 8
    }
scripts:
  - type: beforeRequest
    code: |-
      if (!pm.environment.get('pendaftaran_id')) {
        console.warn('pendaftaran_id kosong -> request di-skip (jalankan request 3 dulu)');
        pm.execution.skipRequest();
      }
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test('Status pendaftaran naik ke wawancara', () => pm.expect(json.data?.status).to.eql('wawancara'));
    language: text/javascript
order: 16000
