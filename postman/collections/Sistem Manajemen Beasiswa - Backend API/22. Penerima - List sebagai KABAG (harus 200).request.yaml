$kind: http-request
url: "{{base_url}}/api/penerima"
method: GET
headers:
  Authorization: Bearer {{token_kabag}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test('Response punya property data berbentuk array', () => {
        pm.expect(json).to.have.property('data');
        pm.expect(json.data).to.be.an('array');
      });
    language: text/javascript
order: 22000
