server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    index beranda.html index.html;

    # Aset statis yang hilang harus balas 404 asli, bukan ikut fallback ke
    # beranda.html — supaya script/CSS/gambar yang salah path kelihatan
    # jelas sebagai error di console, bukan "Unexpected token '<'" karena
    # HTML ke-load sebagai JS.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|map)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /beranda.html;
    }
}
