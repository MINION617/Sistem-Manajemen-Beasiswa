version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: sim-beasiswa-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-sim_beasiswa_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USER:-beasiswa_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-beasiswa_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sim-beasiswa-net

  backend:
    build: ./backend
    container_name: sim-beasiswa-backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=mysql-db
      - DB_USER=${DB_USER:-beasiswa_user}
      - DB_PASS=${DB_PASSWORD:-beasiswa_pass}
      - DB_NAME=${DB_NAME:-sim_beasiswa_db}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - mysql-db
    networks:
      - sim-beasiswa-net

  frontend:
    build: ./frontend
    container_name: sim-beasiswa-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_KEY=${SUPABASE_KEY}
    networks:
      - sim-beasiswa-net

  nginx:
    image: nginx:alpine
    container_name: sim-beasiswa-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sim-beasiswa-net

networks:
  sim-beasiswa-net:
    driver: bridge

volumes:
  mysql_data:
